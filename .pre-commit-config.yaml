# See https://pre-commit.com for more information
repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        language: system
        entry: bash -c 'unformatted=$(gofmt -l .); if [ -n "$unformatted" ]; then echo "gofmt needed:"; echo "$unformatted"; gofmt -w .; exit 1; fi'
        pass_filenames: false
        types: [go]

      - id: go-vet
        name: go vet
        language: system
        entry: go vet ./...
        pass_filenames: false
        types: [go]

      - id: go-test
        name: go test
        language: system
        entry: go test -count=1 ./...
        pass_filenames: false
        types: [go]
